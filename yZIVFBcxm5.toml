# App Configuration File

[app]
name = "MyAwesomeApp"
version = "1.0.0"
debug = true

[server]
host = "localhost"
port = 8080
ssl_enabled = false

[database]
host = "localhost"
port = 5432
name = "myapp_db"
username = "dbuser"
password = "dbpassword"

[logging]
level = "INFO"
file = "app.log"
max_size = "10MB"

[features]
enable_cache = true
cache_ttl = 300
rate_limiting = true
max_requests_per_minute = 1000