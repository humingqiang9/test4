# App Configuration File

[app]
name = "MyAwesomeApp"
version = "1.0.0"
debug = false

[server]
host = "0.0.0.0"
port = 8080
ssl_enabled = true

[database]
host = "localhost"
port = 5432
name = "myapp_db"
username = "dbuser"
password = "dbpassword"

[logging]
level = "INFO"
file = "/var/log/myapp/app.log"
max_size = "10MB"

[features]
enable_cache = true
cache_ttl = 3600
rate_limiting = true
max_requests_per_minute = 1000