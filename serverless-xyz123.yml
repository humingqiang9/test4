service: my-nodejs-lambda-service

frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs18.x
  region: us-east-1
  memorySize: 128
  timeout: 10
  environment:
    NODE_ENV: production

functions:
  hello:
    handler: handler.hello
    events:
      - httpApi:
          path: /hello
          method: get

plugins:
  - serverless-offline

resources:
  Resources:
    MyCustomResource:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: my-serverless-bucket-${self:provider.region}-${self:provider.stage}

custom:
  serverless-offline:
    httpPort: 4000