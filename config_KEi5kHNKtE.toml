# Application Configuration

[server]
host = "localhost"
port = 8080
debug = false

[database]
host = "localhost"
port = 5432
name = "myapp"
user = "dbuser"
password = "dbpassword"

[logging]
level = "info"
file = "/var/log/myapp.log"

[features]
enable_cache = true
cache_ttl = 3600
max_connections = 100

[api]
version = "v1"
rate_limit = 1000
timeout = 30