---
- name: Restart a service
  hosts: all
  become: yes
  vars:
    service_name: apache2
  tasks:
    - name: Restart the specified service
      ansible.builtin.service:
        name: "{{ service_name }}"
        state: restarted
      notify: Service restarted

  handlers:
    - name: Service restarted
      ansible.builtin.debug:
        msg: "The service {{ service_name }} has been restarted successfully"